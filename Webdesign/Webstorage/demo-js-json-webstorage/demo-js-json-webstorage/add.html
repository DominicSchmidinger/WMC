<!DOCTYPE html>
<html lang="de">

<head>
  <title>JS JSON | Webstorage</title>
  <link rel="stylesheet" type="text/css" href="css/mystyle.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="img/spengergasse-logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/add.js"></script>
</head>

<body>
  <div class="container">
    <div class="p-4 rounded text-center text-white bg-danger mb-3">
      <h1>JavaScript | JSON | Webstorage</h1>
      <h3>Activate the webdeveloper tools in the browser (Console)</h3>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <div class="col-md-6 offset-md-3">
        <div class="d-grid gap-2">
          <a class="btn btn-primary" href="index.html" role="button">Show all Heroes</a>
        </div>
      </div>
    </div>
  </div>

  <div class="container mb-3">
    <h2>Add a Hero</h2>
    <div class="row">
      <div class="col-md-6 offset-md-3">
        <div class="mb-3">
          <label for="heroname" class="form-label">Name</label>
          <input type="text" class="form-control" id="heroname" />
        </div>
        <div class="mb-3">
          <label for="heroforce" class="form-label">Force (more than one force: separate with , )</label>
          <input type="text" class="form-control" id="heroforce" placeholder="fly, bulletproof, ..." />
        </div>
        <div class="mb-3">
          <label for="herouniverse" class="form-label">Universe</label>
          <select id="herouniverse" class="form-select" aria-label="select universe">
            <option selected>-</option>
            <option value="dc">DC</option>
            <option value="marvel">Marvel</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="accessoires" class="form-label">accessories (more then one accessories: separate with , )</label>
          <input type="text" class="form-control" id="accessoires" placeholder="belt, sord,...." />
        </div>
        <button id="btn-add" class="btn btn-primary">Add</button>
      </div>
    </div>
  </div>
</body>

</html>
