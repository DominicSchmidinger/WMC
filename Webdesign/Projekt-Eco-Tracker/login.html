<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Eco Tracker - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Eco Tracker</h2>
            <p class="login-subtitle">Meld dich an um weiterzumachen</p>

            <div class="form-group">
                <label>Benutzername</label>
                <input type="text" id="username-input" placeholder="Dein Name...">
            </div>
            <div class="form-group">
                <label>Passwort</label>
                <input type="password" id="password-input" placeholder="••••••••">
            </div>

            <label class="remember-row">
                <input type="checkbox" id="remember-me">
                <span><strong>Angemeldet bleiben</strong> – Benutzername im Browser speichern (Local Storage)</span>
            </label>

            <button class="btn-login" id="login-btn">Einloggen →</button>
            <div class="login-error" id="login-error">Bitte Benutzername und Passwort eingeben.</div>
        </div>
    </div>

    <script>
        const loginBtn     = document.getElementById("login-btn");
        const usernameInput = document.getElementById("username-input");
        const passwordInput = document.getElementById("password-input");
        const rememberMe   = document.getElementById("remember-me");
        const loginError   = document.getElementById("login-error");

        // Gespeicherten Benutzernamen laden (falls vorhanden)
        const savedUsername = localStorage.getItem("ecoUsername");
        if (savedUsername) {
            usernameInput.value = savedUsername;
            rememberMe.checked = true;
        }

        loginBtn.onclick = () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                loginError.style.display = "block";
                return;
            }

            loginError.style.display = "none";

            // Benutzername speichern oder löschen je nach Checkbox
            if (rememberMe.checked) {
                localStorage.setItem("ecoUsername", username);
            } else {
                localStorage.removeItem("ecoUsername");
            }

            // Eingeloggten User merken (für diese Session)
            sessionStorage.setItem("ecoLoggedIn", username);

            window.location.href = "index.html";
        };

        // Enter-Taste unterstützen
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") loginBtn.click();
        });
    </script>
</body>
</html>
